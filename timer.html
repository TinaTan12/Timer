<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>酷炫倒计时</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* 酷炫动态背景 */
    .bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
    }

    .bg::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(ellipse at 20% 80%, rgba(120, 0, 255, 0.3) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(255, 0, 128, 0.3) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(0, 255, 255, 0.1) 0%, transparent 70%);
      animation: pulse 8s ease-in-out infinite alternate;
    }

    /* 网格线效果 */
    .grid {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background-image: 
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: gridMove 20s linear infinite;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes pulse {
      0% { opacity: 0.5; transform: scale(1); }
      100% { opacity: 1; transform: scale(1.1); }
    }

    @keyframes gridMove {
      0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
      100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
    }

    .container {
      text-align: center;
      z-index: 1;
    }

    h1 {
      color: rgba(255, 255, 255, 0.9);
      font-size: 1.5rem;
      font-weight: 400;
      letter-spacing: 0.5em;
      margin-bottom: 2rem;
      text-shadow: 0 0 20px rgba(138, 43, 226, 0.5);
    }

    .timer-display {
      font-size: clamp(8rem, 25vw, 16rem);
      font-weight: 900;
      color: #fff;
      text-shadow: 
        0 0 20px rgba(0, 255, 255, 0.8),
        0 0 40px rgba(138, 43, 226, 0.6),
        0 0 80px rgba(255, 0, 128, 0.4);
      line-height: 1;
      margin: 2rem 0;
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s ease;
    }

    .timer-display.pulse {
      animation: numberPulse 1s ease;
    }

    @keyframes numberPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    .timer-display.finish {
      animation: finishBlast 0.5s ease;
      color: #00ffff;
    }

    @keyframes finishBlast {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    .controls {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 2rem;
    }

    .btn {
      padding: 1rem 2.5rem;
      font-size: 1.1rem;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      letter-spacing: 0.2em;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
    }

    .btn-start {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      box-shadow: 0 0 30px rgba(102, 126, 234, 0.6);
    }

    .btn-start:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 40px rgba(102, 126, 234, 0.9);
    }

    .btn-start:active {
      transform: translateY(0);
    }

    .btn-reset {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.9);
      border: 2px solid rgba(255, 255, 255, 0.3);
    }

    .btn-reset:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.5);
    }

    .presets {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    .preset-btn {
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      font-family: 'Orbitron', sans-serif;
      background: rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .preset-btn:hover {
      background: rgba(255, 255, 255, 0.15);
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="grid"></div>
  
  <div class="container">
    <h1>Countdown</h1>
    <div class="timer-display" id="timer">60</div>
    
    <div class="presets">
      <button class="preset-btn" data-seconds="10">10秒</button>
      <button class="preset-btn" data-seconds="30">30秒</button>
      <button class="preset-btn" data-seconds="60">1分钟</button>
      <button class="preset-btn" data-seconds="300">5分钟</button>
    </div>

    <div class="controls">
      <button class="btn btn-start" id="startBtn">开始</button>
      <button class="btn btn-reset" id="resetBtn">重置</button>
    </div>
  </div>

  <script>
    const timerDisplay = document.getElementById('timer');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const presetBtns = document.querySelectorAll('.preset-btn');

    let totalSeconds = 60;
    let remainingSeconds = 60;
    let intervalId = null;
    let isRunning = false;

    function updateDisplay() {
      timerDisplay.textContent = remainingSeconds;
      timerDisplay.classList.remove('pulse');
      void timerDisplay.offsetWidth;
      timerDisplay.classList.add('pulse');
    }

    function startCountdown() {
      if (isRunning) return;
      isRunning = true;
      startBtn.textContent = '暂停';

      intervalId = setInterval(() => {
        remainingSeconds--;
        updateDisplay();

        if (remainingSeconds <= 0) {
          clearInterval(intervalId);
          timerDisplay.classList.add('finish');
          timerDisplay.textContent = '0';
          startBtn.textContent = '开始';
          isRunning = false;
        }
      }, 1000);
    }

    function pauseCountdown() {
      if (!isRunning) return;
      clearInterval(intervalId);
      isRunning = false;
      startBtn.textContent = '继续';
    }

    function resetCountdown() {
      clearInterval(intervalId);
      remainingSeconds = totalSeconds;
      isRunning = false;
      startBtn.textContent = '开始';
      timerDisplay.classList.remove('finish');
      updateDisplay();
    }

    startBtn.addEventListener('click', () => {
      if (isRunning) {
        pauseCountdown();
      } else {
        startCountdown();
      }
    });

    resetBtn.addEventListener('click', resetCountdown);

    presetBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        if (!isRunning) {
          totalSeconds = parseInt(btn.dataset.seconds);
          remainingSeconds = totalSeconds;
          updateDisplay();
        }
      });
    });

    updateDisplay();
  </script>
</body>
</html>
